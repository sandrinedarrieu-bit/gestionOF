<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Okara — Demande d'information</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ok-cream:#F3EEE4;
    --ok-green-deep:#1F3A2E;
    --ok-green-mid:#3F6B52;
    --ok-gold:#B98B2E;
    --ok-ink:#24211C;
    --ok-line:#D9D0BD;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:var(--ok-cream);
    color:var(--ok-ink);
    font-family:'Work Sans',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }
  .card{
    width:100%;
    max-width:460px;
    background:#FFFDF9;
    border:1px solid var(--ok-line);
    border-radius:12px;
    padding:40px 36px;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--ok-green-mid);
    margin:0 0 10px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:28px;
    line-height:1.15;
    color:var(--ok-green-deep);
    margin:0 0 14px;
  }
  .leaf-divider{margin:0 0 20px}
  p.lead{
    font-size:14px;
    color:var(--ok-green-mid);
    line-height:1.6;
    margin:0 0 28px;
  }
  label{
    display:block;
    font-size:13px;
    color:var(--ok-green-deep);
    margin:0 0 6px;
    font-weight:500;
  }
  .field{margin-bottom:18px}
  input,select{
    width:100%;
    padding:11px 12px;
    border:1px solid var(--ok-line);
    border-radius:8px;
    font-family:'Work Sans',sans-serif;
    font-size:14px;
    color:var(--ok-ink);
    background:#fff;
  }
  input:focus,select:focus{
    outline:2px solid var(--ok-green-mid);
    outline-offset:1px;
  }
  button{
    width:100%;
    margin-top:8px;
    padding:13px;
    border:none;
    border-radius:8px;
    background:var(--ok-gold);
    color:var(--ok-green-deep);
    font-family:'Work Sans',sans-serif;
    font-weight:500;
    font-size:15px;
    cursor:pointer;
  }
  button:hover{filter:brightness(0.95)}
  button:disabled{opacity:.6;cursor:default}
  .consent-label{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:var(--ok-green-mid);font-weight:400;line-height:1.5;cursor:pointer}
  .consent-label input{width:auto;margin-top:3px;flex-shrink:0}
  .consent-label a{color:var(--ok-green-deep)}
  .consent{margin-bottom:20px}
  .msg{font-size:13px;margin-top:16px;text-align:center}
  .msg.ok{color:var(--ok-green-mid)}
  .msg.err{color:#A3402D}
  @media (prefers-reduced-motion:no-preference){
    .card{animation:fadein .5s ease-out}
  }
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">L'Okara — École internationale de pâtisserie végétale</p>
  <h1>Une question, une formation en tête ?</h1>
  <svg class="leaf-divider" width="72" height="14" viewBox="0 0 72 14" fill="none" aria-hidden="true">
    <path d="M0 7 H26" stroke="#D9D0BD" stroke-width="1"/>
    <path d="M36 2 C40 2 42 6 36 12 C30 6 32 2 36 2 Z" fill="#3F6B52"/>
    <path d="M46 7 H72" stroke="#D9D0BD" stroke-width="1"/>
  </svg>
  <p class="lead">Laissez-nous vos coordonnées : nous vous envoyons le programme complet ainsi qu'un court questionnaire de pré-inscription.</p>

  <form id="prospect-form">
    <div class="field">
      <label for="nom">Nom</label>
      <input id="nom" name="nom" type="text" required autocomplete="family-name">
    </div>
    <div class="field">
      <label for="prenom">Prénom</label>
      <input id="prenom" name="prenom" type="text" required autocomplete="given-name">
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="email">
    </div>
    <div class="field">
      <label for="telephone">Téléphone (facultatif)</label>
      <input id="telephone" name="telephone" type="tel" autocomplete="tel">
    </div>
    <div class="field">
      <label for="formation">Formation souhaitée</label>
      <select id="formation" name="formation" required>
        <option value="" disabled selected>Chargement des formations…</option>
      </select>
    </div>
    <div class="field consent">
      <label class="consent-label">
        <input type="checkbox" id="consent" name="consent" required>
        <span>J'accepte que L'Okara utilise mes données pour traiter ma demande, conformément à la <a href="/politique-confidentialite.html" target="_blank" rel="noopener">politique de confidentialité</a>.</span>
      </label>
    </div>
    <button type="submit" id="submit-btn">Envoyer ma demande</button>
    <p class="msg" id="form-msg" role="status"></p>
  </form>
</div>

<script>
async function loadFormations(){
  const select = document.getElementById('formation');
  try{
    const res = await fetch('/api/formations');
    const data = await res.json();
    select.innerHTML = '<option value="" disabled selected>Choisissez une formation</option>';
    data.formations.forEach(f=>{
      const opt = document.createElement('option');
      opt.value = f.id;
      opt.textContent = f.nom;
      select.appendChild(opt);
    });
  }catch(e){
    select.innerHTML = '<option value="" disabled selected>Formations indisponibles, réessayez</option>';
  }
}
loadFormations();

document.getElementById('prospect-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const msg = document.getElementById('form-msg');
  btn.disabled = true;
  btn.textContent = 'Envoi en cours…';
  msg.textContent = '';
  msg.className = 'msg';

  const payload = {
    nom: document.getElementById('nom').value,
    prenom: document.getElementById('prenom').value,
    email: document.getElementById('email').value,
    telephone: document.getElementById('telephone').value,
    formationId: document.getElementById('formation').value,
    consent: document.getElementById('consent').checked
  };

  try{
    const res = await fetch('/api/submit', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error('submit failed');
    document.getElementById('prospect-form').reset();
    msg.textContent = 'Merci, votre demande a bien été envoyée. Vous allez recevoir un email avec le programme.';
    msg.classList.add('ok');
  }catch(err){
    msg.textContent = "Une erreur est survenue, merci de réessayer dans un instant.";
    msg.classList.add('err');
  }finally{
    btn.disabled = false;
    btn.textContent = 'Envoyer ma demande';
  }
});
</script>
</body>
</html>
